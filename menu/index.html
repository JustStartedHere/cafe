<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FBF7F2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#17120E" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Menu Kopi Senja — kopi & camilan.">
  <title>Menu Cafe</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../assets/img/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/img/icon-192.png">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <div class="header__top">
        <div class="header__id">
          <h1 class="header__name" id="cafe-name">Kopi Senja</h1>
          <p class="header__tagline" id="cafe-tagline"></p>
        </div>
        <div class="lang" role="group" data-i18n-aria-label="langGroup">
          <button type="button" class="lang__btn" data-lang="id" data-i18n-aria-label="langId" aria-pressed="true">ID</button>
          <button type="button" class="lang__btn" data-lang="en" data-i18n-aria-label="langEn" aria-pressed="false">EN</button>
        </div>
      </div>
      <!-- Chip skeleton me-reserve tinggi strip sejak first paint. Tanpa ini header
           membesar saat chip asli muncul dan seluruh halaman bergeser turun (CLS). -->
      <nav class="chips" id="chips" data-i18n-aria-label="categories" aria-hidden="true">
        <span class="chip chip--skeleton"></span>
        <span class="chip chip--skeleton"></span>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- Skeleton hidup di shell HTML: first paint instan, tinggi kartu sudah ter-reserve. -->
    <div id="skeleton" aria-hidden="true">
      <ul class="grid">
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
      </ul>
    </div>

    <div id="menu" hidden></div>

    <div id="empty" class="state" hidden>
      <h2 class="state__title" data-i18n="emptyTitle">Menu segera hadir</h2>
      <p class="state__text" data-i18n="emptyText">Kami sedang menyiapkannya.</p>
    </div>

    <div id="error" class="state" hidden>
      <h2 class="state__title" data-i18n="errorTitle">Menu gagal dimuat</h2>
      <p class="state__text" data-i18n="errorText">Periksa koneksi Anda, lalu coba lagi.</p>
      <button type="button" class="button" id="retry" data-i18n="retry">Coba lagi</button>
    </div>
  </main>

  <script type="module" src="../assets/js/menu.js"></script>
</body>
</html>
