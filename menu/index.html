<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FBF7F2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#17120E" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Menu Kopi Senja — kopi & camilan.">
  <title>Menu Cafe</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="manifest" href="../manifest.webmanifest">
  <link rel="icon" href="../assets/img/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../assets/img/icon-192.png">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <div class="header__top">
        <div class="header__id">
          <h1 class="header__name" id="cafe-name">Kopi Senja</h1>
          <p class="header__tagline" id="cafe-tagline"></p>
        </div>
        <div class="lang" role="group" data-i18n-aria-label="langGroup">
          <button type="button" class="lang__btn" data-lang="id" data-i18n-aria-label="langId" aria-pressed="true">ID</button>
          <button type="button" class="lang__btn" data-lang="en" data-i18n-aria-label="langEn" aria-pressed="false">EN</button>
        </div>
      </div>
      <!-- Chip skeleton me-reserve tinggi strip sejak first paint. Tanpa ini header
           membesar saat chip asli muncul dan seluruh halaman bergeser turun (CLS). -->
      <nav class="chips" id="chips" data-i18n-aria-label="categories" aria-hidden="true">
        <span class="chip chip--skeleton"></span>
        <span class="chip chip--skeleton"></span>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <!-- Skeleton hidup di shell HTML: first paint instan, tinggi kartu sudah ter-reserve. -->
    <div id="skeleton" aria-hidden="true">
      <ul class="grid">
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
        <li class="card"><div class="skeleton__media"></div><div class="skeleton__line"></div><div class="skeleton__line skeleton__line--short"></div></li>
      </ul>
    </div>

    <div id="menu" hidden></div>

    <div id="empty" class="state" hidden>
      <h2 class="state__title" data-i18n="emptyTitle">Menu segera hadir</h2>
      <p class="state__text" data-i18n="emptyText">Kami sedang menyiapkannya.</p>
    </div>

    <div id="error" class="state" hidden>
      <h2 class="state__title" data-i18n="errorTitle">Menu gagal dimuat</h2>
      <p class="state__text" data-i18n="errorText">Periksa koneksi Anda, lalu coba lagi.</p>
      <button type="button" class="button" id="retry" data-i18n="retry">Coba lagi</button>
    </div>
  </main>

  <!-- Footer sosial: href diisi runtime dari menu.cafe (renderFooter). Tautan yang
       tak punya URL disembunyikan; footer disembunyikan bila tak ada satu pun. -->
  <footer class="site-footer" id="site-footer" hidden>
    <div class="wrap site-footer__inner">
      <!-- Deskripsi & alamat usaha, diisi runtime dari menu.cafe (renderFooter). -->
      <p class="site-footer__about" id="foot-description" hidden></p>
      <p class="site-footer__address" id="foot-address" hidden></p>
      <p class="site-footer__head" data-i18n="follow">Ikuti &amp; kunjungi kami</p>
      <div class="site-footer__links">
        <a class="wa-button" id="foot-wa" href="#" target="_blank" rel="noopener noreferrer" hidden>
          <svg class="wa-button__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M17.5 14.4c-.3-.1-1.7-.8-1.9-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-1.5-.7-2.5-1.3-3.4-3-.3-.4.3-.4.7-1.3.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.2.2 2.1 3.2 5 4.5 1.9.8 2.6.9 3.5.8.6-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3ZM12 2a10 10 0 0 0-8.6 15l-1.3 4.9 5-1.3A10 10 0 1 0 12 2Zm0 18.3c-1.5 0-3-.4-4.3-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.3 8.3 0 1 1 12 20.3Z"/></svg>
          <span data-i18n="waContact">Chat WhatsApp</span>
        </a>
        <ul class="socials">
          <li>
            <a id="foot-instagram" class="social-link" href="#" target="_blank" rel="noopener noreferrer" data-i18n-aria-label="socialInstagram" hidden>
              <svg class="social-link__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2c2.7 0 3 0 4.1.1 1 .1 1.7.2 2.3.5.6.2 1.1.5 1.6 1s.8 1 1 1.6c.2.6.4 1.3.5 2.3.1 1.1.1 1.4.1 4.1s0 3-.1 4.1c-.1 1-.2 1.7-.5 2.3-.2.6-.5 1.1-1 1.6s-1 .8-1.6 1c-.6.2-1.3.4-2.3.5-1.1.1-1.4.1-4.1.1s-3 0-4.1-.1c-1-.1-1.7-.2-2.3-.5-.6-.2-1.1-.5-1.6-1s-.8-1-1-1.6c-.2-.6-.4-1.3-.5-2.3C2.4 15 2.4 14.7 2.4 12s0-3 .1-4.1c.1-1 .2-1.7.5-2.3.2-.6.5-1.1 1-1.6s1-.8 1.6-1c.6-.2 1.3-.4 2.3-.5C9 2.4 9.3 2.4 12 2.4Zm0 3.2A6.4 6.4 0 1 0 12 18 6.4 6.4 0 0 0 12 5.2Zm0 2.3a4.1 4.1 0 1 1 0 8.2 4.1 4.1 0 0 1 0-8.2Zm5.1-.4a1.1 1.1 0 1 0 0 2.2 1.1 1.1 0 0 0 0-2.2Z"/></svg>
            </a>
          </li>
          <li>
            <a id="foot-tiktok" class="social-link" href="#" target="_blank" rel="noopener noreferrer" data-i18n-aria-label="socialTiktok" hidden>
              <svg class="social-link__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 3c.4 2.4 1.8 3.9 4.1 4.1v3c-1.5.1-2.9-.4-4.1-1.2v5.6a6 6 0 1 1-6-6c.4 0 .7 0 1 .1v3.1a2.9 2.9 0 1 0 2 2.8V3h3Z"/></svg>
            </a>
          </li>
          <li>
            <a id="foot-maps" class="social-link" href="#" target="_blank" rel="noopener noreferrer" data-i18n-aria-label="socialMaps" hidden>
              <svg class="social-link__icon" viewBox="0 0 24 24" fill-rule="evenodd" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5.2 7 13 7 13s7-7.8 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z"/></svg>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </footer>

  <!-- Kembali ke galeri desain — hanya relevan selama fase showcase (galeri di root
       bersifat sementara, lihat CLAUDE.md). Hapus baris ini saat handover. -->
  <nav class="gallery-back" aria-label="Showcase">
    <a href="../" data-i18n="backToGallery">← Kembali ke galeri desain</a>
  </nav>

  <script type="module" src="../assets/js/menu.js"></script>
</body>
</html>
